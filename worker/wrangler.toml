# Config for the hearts Worker only. The static site is deployed separately as a
# Cloudflare Pages project (see ../wrangler.toml).

name = "july-trip-hearts"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# The shared counters live here. Create the namespace once with:
#   npx wrangler kv namespace create HEARTS
# then paste the returned id below (replace the placeholder).
[[kv_namespaces]]
binding = "HEARTS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
