# The anticipated weather per city for early July. Figures are climate normals
# (JMA), so "what a typical July 3–5 looks like" — not a forecast.

- id: kurobe-weather
  destination: kurobe
  headline: Normally rainy season, and the mountain is cold
  rows:
    - label: rainy season
      value: Normally still on — Hokuriku's tsuyu typically ends about July 23.
      sourceLabel: japan-guide / JMA
      sourceUrl: https://www.japan-guide.com/e/e2277.html
    - label: in the valley
      value: Hot and humid — about 30°C high, 79% humidity (Toyama July normal).
      sourceLabel: JMA normals
      sourceUrl: https://www.data.jma.go.jp/stats/etrn/view/nml_sfc_ym.php?prec_no=55&block_no=47607
    - label: up the alpine route
      value: About 16°C at Murodo (~2,450 m) — cool even at midday, pack a layer.
      sourceLabel: alpen-route.com
      sourceUrl: https://www.alpen-route.com/en/faq/

- id: atami-weather
  destination: atami
  headline: Normally rainy season, warm and humid by the sea
  rows:
    - label: rainy season
      value: Normally still on — the Tokai/Izu tsuyu typically ends about July 19; an early-July day is close to a coin-flip for rain.
      sourceLabel: japan-guide / JMA
      sourceUrl: https://www.japan-guide.com/e/e2277.html
    - label: temperature
      value: Warm and humid — about 29°C high, 80% humidity (Ajiro July normal).
      sourceLabel: JMA normals
      sourceUrl: https://www.data.jma.go.jp/stats/etrn/view/nml_sfc_ym.php?prec_no=50&block_no=47668
    - label: the sea
      value: Swimmable, but the beach season opens July 11 — it's a stroll, not a swim, on these dates.
      sourceLabel: Atami Tourism Association
      sourceUrl: https://www.ataminews.gr.jp/event/142

- destination: numazu
  headline: Rainy season, warm and humid by Suruga Bay
  forecast:
    issued: "as of 29 Jun — for Fri–Sun Jul 3–5"
    note: "A real short-range forecast, not the climate normal — cloudy with a rain chance each day, and cooler than the 30°C normal because of the cloud. It will keep shifting; re-checked closer in. Plan the aquariums and indoor play as the wet-day spine, and save the Skywalk and Genbe-gawa wading for any dry window."
    days:
      - day: "Fri Jul 3"
        sky: "Cloudy, showers likely"
        high: 25
        low: 20
        rain: "50%"
      - day: "Sat Jul 4"
        sky: "Cloudy"
        high: 24
        low: 21
        rain: "40%"
      - day: "Sun Jul 5"
        sky: "Cloudy"
        high: 25
        low: 20
        rain: "40%"
    sources:
      - { label: "JMA (issued 29 Jun 17:00 JST)", url: "https://www.jma.go.jp/bosai/forecast/" }
      - { label: "World Weather Online", url: https://www.worldweatheronline.com/numazu-weather/shizuoka/jp.aspx }
  rows:
    - label: rainy season
      value: Mid-tsuyu — the Tokai rainy season normally ends about July 19, so July 3 to 5 is the wet, muggy heart of it. Pack rain gear and indoor backups.
      sourceLabel: japan-guide / JMA
      sourceUrl: https://www.japan-guide.com/e/e2277.html
    - label: temperature
      value: Warm and humid — about 30°C high, 76% humidity (Mishima July normal).
      sourceLabel: JMA normals
      sourceUrl: https://www.data.jma.go.jp/stats/etrn/view/nml_sfc_ym.php?prec_no=50&block_no=47657
    - label: the sea
      value: Suruga Bay is about 22 to 24°C, and the city beach (Senbonhama) opens in August — so the coast is for the port, not a swim.
      sourceLabel: Numazu tourism
      sourceUrl: https://www.numazukanko.jp/
