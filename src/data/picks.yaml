# The lodging decision layer the home renders. Hard rule the group set: one unit
# must hold all five of us — no splitting across two domes. Role-tagged: the three
# that fit five and we'd actually book (pick / safe / also), then the ones we
# passed on. Cards carry DATA only — facts, numbers, specifics; the photos carry
# the feel. No interpretation. Availability is a dated snapshot (checked in a
# browser Mon Jun 29) — it moves.

# ── The three that fit all five in one place ─────────────────────────────────
