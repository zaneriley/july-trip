# The lodging decision layer the home renders. Hard rule the group set: one unit
# must hold all five of us — no splitting across two domes. Role-tagged: the three
# that fit five and we'd actually book (pick / safe / also), then the ones we
# passed on (named honestly). Availability is a dated snapshot (checked in a
# browser Mon Jun 29) — it moves. Shared facts (photos, fuller detail) live in the
# lodging/glamping collections; this file holds only the decision framing.

# ── The three that fit all five in one place ─────────────────────────────────
- id: pick-shuzenji
  role: pick
  order: 1
  name: Shuzenji Forest
  lat: 34.97494
  lng: 138.98680
  ratingNote: Small and newer — only ~13 guest reviews so far, so no settled score yet.
  photoSubject: g-shuzenji
  vibe: A private cabin with its own open-air onsen on the deck — the whole place to ourselves.
  onsen: Private — our own terrace onsen, any hour, nobody splitting off.
  fits: One cottage, two tatami bedrooms; the toddler stays free.
  getThere: About 50 min — Mishima to Shuzenji by train, then a 12-min taxi.
  meals: Room-only — a kitchen and BBQ, so we shop and cook.
  toddler: Tatami rooms and a kitchen; calm and self-contained.
  allIn: Roughly ¥60–80k for all of us, two nights (room only — add groceries).
  availSat: "2 cottages left"
  catch: We cook our own meals, and the riverside play area only opens July 18 — just after us.
  backup: ""
  detailUrl: /glamping#g-shuzenji
  bookUrl: "https://www.jalan.net/yad314863/plan/?stayYear=2026&stayMonth=07&stayDay=03&stayCount=2&roomCount=1&adultNum=4"
  mapUrl: "https://www.google.com/maps/search/?api=1&query=34.97494,138.98680"

- id: innthepark
  role: safe
  order: 2
  name: INN THE PARK
  lat: 35.1591
  lng: 138.84862
  ratingNote: Well-reviewed on Jalan (21 reviews) with strong marks, but no single overall score is published.
  photoSubject: numazu-innthepark
  vibe: A whole forest cottage to ourselves in a "stayable park" just outside Numazu — woods to roam, a campfire and marshmallows.
  onsen: Public bathhouse only, men/women split — no private bath. A parent can still bathe with the toddler.
  fits: A whole cottage with four bedrooms — easily holds the five of us, and it's the closest to Numazu.
  getThere: In Numazu — about a 20-min taxi from Numazu station (no shuttle).
  meals: A meal plan is required — a BBQ (about ¥12.8k a person) or a French course (about ¥19.8k); no cook-your-own.
  toddler: A ground-level cottage (not the suspended sphere tents), with forest, a campfire and marshmallows.
  allIn: Whole-building rate isn't published; with the required meals, budget about ¥13k+ per adult for food on top — get a quote.
  availSat: "1 cottage left"
  catch: Public baths only, the price is opaque, and it's down to its last cottage for Saturday — book fast if it's the one.
  backup: ""
  detailUrl: /numazu#stay
  bookUrl: "https://www.jalan.net/yad340186/plan/?stayYear=2026&stayMonth=07&stayDay=03&stayCount=2&roomCount=1&adultNum=4"
  mapUrl: "https://www.google.com/maps/search/?api=1&query=35.1591,138.84862"

- id: also-sunvalley
  role: also
  order: 3
  name: Sun Valley Izu-Nagaoka
  lat: 35.03511
  lng: 138.92902
  rating: "4.4"
  ratingCount: "4,359"
  ratingSource: Jalan
  photoSubject: numazu-sunvalley
  vibe: A proper onsen hotel — a big hinoki bath hall, a free Mishima shuttle, every meal done for us.
  onsen: Shared hinoki baths (men/women split) plus a free private open-air slot — so a parent and the toddler take the private one.
  fits: One 53m² room with its own open-air bath, four adults and the toddler.
  getThere: About 25 min — a free shuttle from Mishima station (reserve the day before).
  meals: Dinner and breakfast buffet included.
  toddler: A kids' game corner and picture-book library, and meals are handled.
  allIn: Roughly ¥150k for all of us, two nights — but that's with every meal included.
  availSat: "a few left"
  catch: Priciest on paper, but it's all-meals-included and the least hassle with a kid.
  backup: ""
  detailUrl: /numazu#stay
  bookUrl: "https://www.jalan.net/yad345636/plan/?stayYear=2026&stayMonth=07&stayDay=03&stayCount=2&roomCount=1&adultNum=4"
  mapUrl: "https://www.google.com/maps/search/?api=1&query=35.03511,138.92902"

# ── Passed on (named honestly, sorted by the fits-five rule) ──────────────────
- id: passed-tenku
  role: passed
  order: 4
  name: Tenku Terrace
  why: A stunning Numazu dome with a Fuji-over-the-bay view, but the domes don't hold all five in one — and we want to stay together, so it's out.

- id: passed-glamaira
  role: passed
  order: 5
  name: Glam Aira
  why: One dome does hold all five and it has its own in-room onsen — but it's about 1.5h from the Numazu sights and pricier, so it's a stretch for this trip.

- id: passed-shaboten
  role: passed
  order: 6
  name: Izu Shaboten Village
  why: One dome fits the five of us and the kid would love the animal park next door — but Saturday July 4 is already sold out, so it can't be our two-night base.

- id: passed-ufufu
  role: passed
  order: 7
  name: UFUFU Village
  why: Lovely onsen domes, but each one caps at four people — the five of us would mean two separate domes, which we ruled out.
