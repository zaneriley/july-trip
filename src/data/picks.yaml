# The lodging decision layer — what the home renders. One file, role-tagged:
# the three we'd actually book (pick / safe / also) and the four we passed on.
# Availability is a dated snapshot (checked in-browser Mon Jun 29) — it moves.
# Shared facts (photos, fuller detail) live in the lodging/glamping collections;
# this file holds only the decision-specific framing.

# ── The three worth a look ────────────────────────────────────────────────────
- id: pick-shuzenji
  role: pick
  order: 1
  name: Shuzenji Forest
  lat: 34.97494
  lng: 138.98680
  ratingNote: Small and newer — only ~13 guest reviews so far, so no settled score yet.
  photoSubject: g-shuzenji
  vibe: A private cabin with its own open-air onsen on the deck — the whole place to ourselves.
  onsen: Private — our own terrace onsen, any hour, nobody splitting off.
  fits: One cottage, two tatami bedrooms; the toddler stays free.
  getThere: About 50 min — Mishima to Shuzenji by train, then a 12-min taxi.
  meals: Room-only — a kitchen and BBQ, so we shop and cook.
  toddler: Tatami rooms and a kitchen; calm and self-contained.
  allIn: Roughly ¥60–80k for all of us, two nights (room only — add groceries).
  availSat: "2 cottages left"
  catch: We cook our own meals, and the riverside play area only opens July 18 — just after us.
  backup: If it sells out, Glam Aira (its own in-dome onsen, a bit farther out).
  detailUrl: /glamping#g-shuzenji

- id: safe-tenku
  role: safe
  order: 2
  name: Tenku Terrace
  lat: 34.9625
  lng: 138.7678
  rating: "4.18"
  ratingCount: "207"
  ratingSource: Rakuten
  photoSubject: tenku-terrace
  vibe: A dome on a Numazu ridge with Mt Fuji over the bay, and a bath in the room facing the sunset.
  onsen: Private — a semi-open-air bath in every room, with the Fuji view.
  fits: Take a family deluxe dome — the standard rate is priced for two, the big domes take families.
  getThere: In Numazu itself — west coast, about 30–40 min by car or taxi from the station.
  meals: Seafood-BBQ dinner plans, with free-flowing drinks on the dinner plans.
  toddler: A private in-room bath means no public-bath timing with a three-year-old.
  allIn: From ¥31k Fri / ¥47k Sat per dome (priced for two) — we'd need a real five-person quote.
  availSat: "open all weekend"
  catch: We still have to confirm one dome fits all five, and the real five-person price.
  backup: ""
  detailUrl: https://www.tenkuu-terrace.jp/

- id: also-sunvalley
  role: also
  order: 3
  name: Sun Valley Izu-Nagaoka
  lat: 35.03511
  lng: 138.92902
  rating: "4.4"
  ratingCount: "4,359"
  ratingSource: Jalan
  photoSubject: numazu-sunvalley
  vibe: A proper onsen hotel — a big hinoki bath hall, a free Mishima shuttle, every meal done for us.
  onsen: Shared hinoki baths (men/women split) plus a free private open-air slot — so a parent and the toddler take the private one.
  fits: One 53m² room with its own open-air bath, four adults and the toddler.
  getThere: About 25 min — a free shuttle from Mishima station (reserve the day before).
  meals: Dinner and breakfast buffet included.
  toddler: A kids' game corner and picture-book library, and meals are handled.
  allIn: Roughly ¥150k for all of us, two nights — but that's with every meal included.
  availSat: "a few left"
  catch: Priciest on paper, but it's all-meals-included and the least hassle with a kid.
  backup: ""
  detailUrl: /numazu#stay

# ── The four we passed on (named honestly, so the curation is trustworthy) ─────
- id: passed-innthepark
  role: passed
  order: 4
  name: INN THE PARK
  why: In Numazu, a whole forest cottage that fits us — but the bath is public-only, the price is opaque, and it's down to its last cottage for Saturday.

- id: passed-shaboten
  role: passed
  order: 5
  name: Izu Shaboten Village
  why: The toddler favourite — a cactus-and-animal park right next door — but Saturday July 4 is already sold out, so it can't be our two-night base.

- id: passed-ufufu
  role: passed
  order: 6
  name: UFUFU Village
  why: Lovely onsen domes, but each one caps at four people — the five of us would mean booking two separate domes.

- id: passed-glamaira
  role: passed
  order: 7
  name: Glam Aira
  why: An in-dome private onsen with a sea view — solid, but about 1.5h out and pricier, so we're keeping it as Shuzenji's backup.
