- id: kurobe-dam
  name: Kurobe Dam
  category: sightseeing
  lat: 36.56639
  lng: 137.66139
  note: Japan's tallest dam (186 m); the summer water discharge is the signature sight.
  destination: kurobe
  source: { url: https://en.wikipedia.org/wiki/Kurobe_Dam, type: wikimedia }

- id: kurobe-gorge
  name: Kurobe Gorge
  category: sightseeing
  lat: 36.644444
  lng: 137.683333
  note: V-shaped granite canyon and designated Place of Scenic Beauty, traversed by the gorge railway.
  destination: kurobe
  source: { url: https://www.wikidata.org/wiki/Q11179607, type: wikidata }

- id: unazuki-dam
  name: Unazuki Dam
  category: sightseeing
  lat: 36.80944
  lng: 137.59028
  note: A 97 m gravity dam (2001), the most downstream of the Kurobe River dams, near the onsen.
  destination: kurobe
  source: { url: https://en.wikipedia.org/wiki/Unazuki_Dam, type: wikimedia }

- id: unazuki-onsen
  name: Unazuki onsen
  category: onsen
  lat: 36.817083
  lng: 137.581528
  note: Hot-spring resort town at the mouth of the gorge (established 1923).
  destination: kurobe
  source: { url: https://en.wikipedia.org/wiki/Unazuki_Onsen, type: wikimedia }

- id: cafe-serene
  name: Cafe Serene
  category: coffee
  lat: 36.813528
  lng: 137.58528
  note: Cafe at the Serene art-museum complex by the gorge entrance; coffee brewed with Kurobe water.
  destination: kurobe
  source: { url: https://www.unazuki-selene.com/, type: official }

- id: cafe-mozart
  name: Cafe Mozart
  category: kissaten
  lat: 36.8156
  lng: 137.5840
  note: Retro Mozart-themed kissaten in central Unazuki Onsen, known for morning sets.
  destination: kurobe
  coordsUnverified: true
  source: { url: https://tabelog.com/en/toyama/A1602/A160201/16000182/, type: tabelog }

