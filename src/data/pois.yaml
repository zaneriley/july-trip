# Real, sourced map points. Coordinates trace to the source on each entry
# (Wikipedia/Wikidata infoboxes for stations and landmarks; Tabelog/official for
# cafes, address-geocoded; OSM/Mapion for a few). coordsUnverified marks an
# approximate coordinate honestly. Categories drive pin colour and the map filter
# only — never a chip on a card.

