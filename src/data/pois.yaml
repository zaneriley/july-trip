  destination: kurobe
  source: { url: https://en.wikipedia.org/wiki/Unazuki_Station, type: wikimedia }

- id: keyakidaira-station
  name: Keyakidaira Station
  category: train-stop
  lat: 36.6969
  lng: 137.6580
  note: Upstream terminus of the gorge railway, deep in the canyon; trailheads and viewpoints.
  destination: kurobe
  source: { url: https://en.wikipedia.org/wiki/Keyakidaira_Station, type: wikimedia }

- id: tateyama-station
  name: Tateyama Station
  category: train-stop
  lat: 36.5833137
  lng: 137.4453163
  note: Western start of the alpine route and base of the Tateyama cable car.
  destination: kurobe
  source: { url: https://en.wikipedia.org/wiki/Tateyama_Station_(Toyama), type: wikimedia }

- id: kurobedaira-station
  name: Kurobedaira Station
  category: train-stop
  lat: 36.581750
  lng: 137.452472
  note: Transfer between the Tateyama ropeway and the Kurobe cable car, about 1,828 m.
  destination: kurobe
  source: { url: https://en.wikipedia.org/wiki/Kurobedaira_Station, type: wikimedia }

- id: murodo
  name: Murodo
  category: viewpoint
  lat: 36.5773
  lng: 137.5955
  note: Highest point on the alpine route, about 2,450 m — alpine plateau with Mikurigaike pond.
  destination: kurobe
  source: { url: https://en.wikipedia.org/wiki/Murod%C5%8D_Station, type: wikimedia }

- id: daikanbo
  name: Daikanbo
  category: viewpoint
  lat: 36.5696919
  lng: 137.6316977
  note: Cliffside panorama over Lake Kurobe and the Ushiro-Tateyama range.
  destination: kurobe
