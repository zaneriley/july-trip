# Real, sourced map points. Coordinates trace to the source on each entry
# (Wikipedia/Wikidata infoboxes for stations and landmarks; Tabelog/official for
# cafes, address-geocoded; OSM/Mapion for a few). coordsUnverified marks an
# approximate coordinate honestly. Categories drive pin colour and the map filter
# only — never a chip on a card.

# ─── Kurobe ────────────────────────────────────────────────────────────────

- id: toyama-station
  name: Toyama Station
  category: train-stop
  lat: 36.701217
  lng: 137.213209
  note: Regional gateway — Hokuriku Shinkansen plus the local railways toward Tateyama and Unazuki.
  destination: kurobe
  source: { url: https://en.wikipedia.org/wiki/Toyama_Station, type: wikimedia }

- id: kurobe-unazukionsen-station
  name: Kurobe-Unazuki-Onsen Station
  category: train-stop
  lat: 36.87472
  lng: 137.48222
  note: The Hokuriku Shinkansen stop for Unazuki and the gorge (Hakutaka services only).
  destination: kurobe
  source: { url: https://en.wikipedia.org/wiki/Kurobe-Unazukionsen_Station, type: wikimedia }

- id: shin-kurobe-station
