# Other glamping & cabins we found near Tokyo — a browse list, not part of the
# main three-way decision. Public-transport route/time/cost included because most
# are pitched "X min by car". Under-6 rides JR free; per-cab taxi fares split.

- id: g-shaboten
  name: "Izu Shaboten Village glamping"
  nameJa: "伊豆シャボテンヴィレッジ"
  area: "Izu Kogen, Shizuoka — base of Mt Omuro"
  lat: 34.9069
  lng: 139.0959
  type: glamping
  order: 1
  capacity: "Japanese-style dome, holds 2–6 — fits the group"
  ac: "All units air-conditioned"
  bath: "Each dome has its own private bath; plus a glamping-only open-air onsen and a kids' reservable bath stocked with toys"
  price: "From about ¥19,800 per adult, one night with two meals"
  kidNote: "The most kid-friendly of the lot — an on-site cactus and ANIMAL park, no age limit, a kids' private bath"
  transitTime: "about 2h30–2h45"
  transitCost: "about ¥6,000 per adult (Odoriko) or ¥3,600 by local"
  transitRoute: "Odoriko direct, Tokyo → Izu Kogen, then a Tokai bus about 17 min (¥430) to the door"
  transitVerdict: "The best transit pick — a direct limited express plus one short bus, genuinely toddler-friendly."
  source: { label: "Official", url: https://id-village.jp/glamping/ }

